name: JSON-java crash triage experiment

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Fuzzing duration in seconds"
        required: true
        default: "600"
        type: string
      seed:
        description: "libFuzzer seed"
        required: true
        default: "0"
        type: string
      dictionary_file:
        description: "Dictionary file under fuzz/"
        required: true
        default: "json.dict"
        type: string

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PROJECT: json-java
      TARGET: JsonRoundTripFuzzer

    steps:
      - name: Checkout experiment repository
        uses: actions/checkout@v4
        with:
          path: experiment

      - name: Checkout OSS-Fuzz
        uses: actions/checkout@v4
        with:
          repository: google/oss-fuzz
          path: oss-fuzz

      - name: Add JsonRoundTripFuzzer to OSS-Fuzz json-java project
        run: |
          set -euo pipefail

          SRC="$GITHUB_WORKSPACE/experiment/fuzz/${TARGET}.java"
          DST="$GITHUB_WORKSPACE/oss-fuzz/projects/${PROJECT}/${TARGET}.java"

          if [ ! -f "$SRC" ]; then
            echo "Fuzz target not found: $SRC"
            exit 1
          fi

          cp "$SRC" "$DST"

      - name: Patch json-java build.sh to create unit-test seed corpus
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          build_sh = Path("oss-fuzz/projects/json-java/build.sh")
          text = build_sh.read_text()

          seed_block = r'''
          # Create an initial seed corpus for JsonRoundTripFuzzer from
          # JSON-java's upstream unit-test JSON resources.
          python3 - <<'PY_SEED'
          import os
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED

          resources = Path("src/test/resources")
          json_files = sorted(resources.rglob("*.json"))

          if not json_files:
              raise SystemExit("No JSON files found in src/test/resources/**/*.json")

          out = Path(os.environ["OUT"]) / "JsonRoundTripFuzzer_seed_corpus.zip"

          with ZipFile(out, "w", ZIP_DEFLATED) as corpus:
              for json_file in json_files:
                  relative = json_file.relative_to(resources)
                  archive_name = str(relative).replace("/", "__")
                  corpus.write(json_file, archive_name)

          print(f"Created {out} with {len(json_files)} JSON seed files")
          PY_SEED

          '''

          marker = "cd src/main/java"

          if "JsonRoundTripFuzzer_seed_corpus.zip" not in text:
              if marker not in text:
                  raise SystemExit("Could not find insertion point in build.sh")
              text = text.replace(marker, seed_block + "\n" + marker, 1)
              build_sh.write_text(text)

          print("===== patched build.sh =====")
          print(build_sh.read_text())
          PY

      - name: Check dictionary file
        run: |
          set -euo pipefail

          DICT_FILE="$GITHUB_WORKSPACE/experiment/fuzz/${{ inputs.dictionary_file }}"

          if [ ! -s "$DICT_FILE" ]; then
            echo "Dictionary file was not found or is empty: $DICT_FILE"
            echo "Files under experiment/fuzz:"
            find "$GITHUB_WORKSPACE/experiment/fuzz" -maxdepth 1 -type f -print | sort
            exit 1
          fi

          echo "Dictionary file: $DICT_FILE"
          ls -lh "$DICT_FILE"

      - name: Build OSS-Fuzz image
        run: |
          set -euo pipefail

          cd oss-fuzz
          python3 infra/helper.py build_image --pull "$PROJECT"

      - name: Build fuzzers
        run: |
          set -euo pipefail

          cd oss-fuzz
          python3 infra/helper.py build_fuzzers \
            --sanitizer=address \
            --clean \
            "$PROJECT"

      - name: Check target and seed corpus
        run: |
          set -euo pipefail

          OUT_DIR="$GITHUB_WORKSPACE/oss-fuzz/build/out/$PROJECT"
          TARGET_PATH="$OUT_DIR/$TARGET"
          SEED_ZIP="$OUT_DIR/${TARGET}_seed_corpus.zip"

          if [ ! -f "$TARGET_PATH" ]; then
            echo "Target wrapper was not created: $TARGET_PATH"
            echo "Build output:"
            find "$OUT_DIR" -maxdepth 1 -type f -print | sort
            exit 1
          fi

          if [ ! -s "$SEED_ZIP" ]; then
            echo "Seed corpus zip was not created or is empty: $SEED_ZIP"
            echo "Build output:"
            find "$OUT_DIR" -maxdepth 1 -type f -print | sort
            exit 1
          fi

          echo "Target wrapper:"
          ls -lh "$TARGET_PATH"

          echo "Seed corpus zip:"
          ls -lh "$SEED_ZIP"

          echo "Seed corpus content:"
          unzip -l "$SEED_ZIP"

      - name: Prepare live corpus
        run: |
          set -euo pipefail

          OUT_DIR="$GITHUB_WORKSPACE/oss-fuzz/build/out/$PROJECT"
          SEED_ZIP="$OUT_DIR/${TARGET}_seed_corpus.zip"
          LIVE_CORPUS="$GITHUB_WORKSPACE/corpus/live"

          rm -rf "$LIVE_CORPUS"
          mkdir -p "$LIVE_CORPUS"

          unzip -q "$SEED_ZIP" -d "$LIVE_CORPUS"

          echo "Initial live corpus count:"
          find "$LIVE_CORPUS" -maxdepth 1 -type f | wc -l

          echo "Initial live corpus files:"
          find "$LIVE_CORPUS" -maxdepth 1 -type f | sort

      - name: Run Jazzer/libFuzzer no-fork crash triage fuzzing
        id: fuzz
        continue-on-error: true
        run: |
          set +e

          OUT_DIR="$GITHUB_WORKSPACE/oss-fuzz/build/out/$PROJECT"
          LIVE_CORPUS="$GITHUB_WORKSPACE/corpus/live"
          CRASH_DIR="$GITHUB_WORKSPACE/crashes"
          DICT_FILE="$GITHUB_WORKSPACE/experiment/fuzz/${{ inputs.dictionary_file }}"
          TRIAGE_DIR="$GITHUB_WORKSPACE/crash-triage"
          FUZZ_LOG="$TRIAGE_DIR/fuzzing-stdout-stderr.log"

          mkdir -p "$CRASH_DIR"
          mkdir -p "$TRIAGE_DIR"

          docker run \
            --platform linux/amd64 \
            --rm \
            -v "$OUT_DIR:/out" \
            -v "$LIVE_CORPUS:/corpus" \
            -v "$CRASH_DIR:/crashes" \
            -v "$DICT_FILE:/dict/${{ inputs.dictionary_file }}:ro" \
            gcr.io/oss-fuzz-base/base-runner:latest \
            /bin/bash -lc "
              set +e

              echo '===== target ====='
              ls -lh /out/$TARGET

              echo '===== initial corpus count ====='
              find /corpus -maxdepth 1 -type f | wc -l

              echo '===== starting Jazzer/libFuzzer no-fork crash triage fuzzing ====='
              echo '===== IMPORTANT: no -fork, no -ignore_crashes, no -ignore_timeouts, no -ignore_ooms ====='

              /out/$TARGET \
                /corpus \
                -dict=/dict/${{ inputs.dictionary_file }} \
                -max_total_time=${{ inputs.duration_seconds }} \
                -seed=${{ inputs.seed }} \
                -artifact_prefix=/crashes/ \
                -print_final_stats=1 \
                -timeout=60 \
                -rss_limit_mb=6144

              status=\$?
              echo \"jazzer_exit_status=\$status\"
              exit \$status
            " > "$FUZZ_LOG" 2>&1

          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

          echo "Generated live corpus count after fuzzing:"
          find "$LIVE_CORPUS" -maxdepth 1 -type f | wc -l

          echo "Crash/failure artifacts:"
          find "$CRASH_DIR" -maxdepth 1 -type f -print | sort || true

          exit 0

      - name: Replay generated crash inputs
        id: replay
        if: always()
        continue-on-error: true
        run: |
          set +e

          OUT_DIR="$GITHUB_WORKSPACE/oss-fuzz/build/out/$PROJECT"
          CRASH_DIR="$GITHUB_WORKSPACE/crashes"
          TRIAGE_DIR="$GITHUB_WORKSPACE/crash-triage"
          REPLAY_DIR="$TRIAGE_DIR/replay-raw-stdout-stderr"
          RESULT_TSV="$TRIAGE_DIR/replay-results.tsv"

          mkdir -p "$REPLAY_DIR"

          printf 'file\tsize_bytes\tsha1\tsha256\texit_code\treproduced\traw_stdout_stderr\n' > "$RESULT_TSV"

          total_candidates=0
          replay_reproduced=0
          replay_not_reproduced=0

          for testcase in "$CRASH_DIR"/crash-* "$CRASH_DIR"/timeout-* "$CRASH_DIR"/oom-*; do
            [ -f "$testcase" ] || continue

            total_candidates=$((total_candidates + 1))

            name="$(basename "$testcase")"
            safe_name="$(printf '%s' "$name" | tr -c 'A-Za-z0-9._-' '_')"
            raw_log="$REPLAY_DIR/${safe_name}.log"

            size="$(wc -c < "$testcase" | tr -d ' ')"
            sha1="$(sha1sum "$testcase" | awk '{print $1}')"
            sha256="$(sha256sum "$testcase" | awk '{print $1}')"

            docker run \
              --platform linux/amd64 \
              --rm \
              -v "$OUT_DIR:/out:ro" \
              -v "$testcase:/testcase:ro" \
              gcr.io/oss-fuzz-base/base-runner:latest \
              /out/$TARGET \
                /testcase \
                -runs=1 \
                -timeout=60 \
                -rss_limit_mb=6144 \
                -print_final_stats=1 \
              > "$raw_log" 2>&1

            status=$?

            if [ "$status" -eq 0 ]; then
              reproduced="no"
              replay_not_reproduced=$((replay_not_reproduced + 1))
            else
              reproduced="yes"
              replay_reproduced=$((replay_reproduced + 1))
            fi

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$name" "$size" "$sha1" "$sha256" "$status" "$reproduced" "replay-raw-stdout-stderr/${safe_name}.log" \
              >> "$RESULT_TSV"
          done

          {
            echo "total_candidates=$total_candidates"
            echo "replay_reproduced=$replay_reproduced"
            echo "replay_not_reproduced=$replay_not_reproduced"
          } > "$TRIAGE_DIR/replay-summary.env"

          echo "total_candidates=$total_candidates" >> "$GITHUB_OUTPUT"
          echo "replay_reproduced=$replay_reproduced" >> "$GITHUB_OUTPUT"
          echo "replay_not_reproduced=$replay_not_reproduced" >> "$GITHUB_OUTPUT"

          exit 0

      - name: Create crash triage report
        if: always()
        run: |
          set -euo pipefail

          TRIAGE_DIR="$GITHUB_WORKSPACE/crash-triage"
          REPORT="$TRIAGE_DIR/bug-report.md"
          RESULT_TSV="$TRIAGE_DIR/replay-results.tsv"
          REPLAY_SUMMARY="$TRIAGE_DIR/replay-summary.env"
          OUT_DIR="$GITHUB_WORKSPACE/oss-fuzz/build/out/$PROJECT"
          TARGET_PATH="$OUT_DIR/$TARGET"
          LIVE_CORPUS="$GITHUB_WORKSPACE/corpus/live"

          total_candidates="0"
          replay_reproduced="0"
          replay_not_reproduced="0"

          if [ -f "$REPLAY_SUMMARY" ]; then
            . "$REPLAY_SUMMARY"
          fi

          {
            echo "# json-java crash triage report"
            echo
            echo "## Summary"
            echo
            echo "- Project: \`$PROJECT\`"
            echo "- Fuzz target: \`$TARGET\`"
            echo "- Mode: no-fork crash triage fuzzing"
            echo "- Sanitizer: \`address\`"
            echo "- Duration: \`${{ inputs.duration_seconds }}\` seconds"
            echo "- Seed: \`${{ inputs.seed }}\`"
            echo "- Dictionary file: \`${{ inputs.dictionary_file }}\`"
            echo "- Seed corpus count: \`$(find "$LIVE_CORPUS" -maxdepth 1 -type f | wc -l | tr -d ' ')\`"
            echo "- Fuzzing exit code: \`${{ steps.fuzz.outputs.exit_code }}\`"
            echo "- Crash candidates generated: \`$total_candidates\`"
            echo "- Replay reproduced: \`$replay_reproduced\`"
            echo "- Replay not reproduced: \`$replay_not_reproduced\`"
            echo
            echo "The original fuzzing stdout/stderr is stored in:"
            echo
            echo "\`\`\`text"
            echo "fuzzing-stdout-stderr.log"
            echo "\`\`\`"
            echo
            echo "Each generated crash candidate was replayed once. The raw stdout/stderr from each replay is stored under:"
            echo
            echo "\`\`\`text"
            echo "replay-raw-stdout-stderr/"
            echo "\`\`\`"
            echo
            echo "## Execution environment"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Date UTC | $(date -u '+%Y-%m-%dT%H:%M:%SZ') |"
            echo "| GitHub runner OS | ${RUNNER_OS:-unknown} |"
            echo "| GitHub runner architecture | ${RUNNER_ARCH:-unknown} |"
            echo "| uname | $(uname -a | sed 's/|/-/g') |"
            echo "| Docker | $(docker --version | sed 's/|/-/g') |"
            echo "| OSS-Fuzz commit | $(git -C "$GITHUB_WORKSPACE/oss-fuzz" rev-parse HEAD) |"
            echo "| Experiment repo commit | $(git -C "$GITHUB_WORKSPACE/experiment" rev-parse HEAD) |"
            echo "| Timeout | 60 seconds |"
            echo "| RSS limit | 6144 MB |"

            if [ -f "$TARGET_PATH" ]; then
              echo "| Target wrapper size | $(wc -c < "$TARGET_PATH" | tr -d ' ') bytes |"
              echo "| Target wrapper SHA-256 | $(sha256sum "$TARGET_PATH" | awk '{print $1}') |"
            fi

            echo
            echo "## Fuzzing command"
            echo
            echo "The fuzzer was run without \`-fork\` and without \`-ignore_crashes\`, \`-ignore_timeouts\`, or \`-ignore_ooms\`."
            echo
            echo "\`\`\`bash"
            echo "/out/$TARGET /corpus \\"
            echo "  -dict=/dict/${{ inputs.dictionary_file }} \\"
            echo "  -max_total_time=${{ inputs.duration_seconds }} \\"
            echo "  -seed=${{ inputs.seed }} \\"
            echo "  -artifact_prefix=/crashes/ \\"
            echo "  -print_final_stats=1 \\"
            echo "  -timeout=60 \\"
            echo "  -rss_limit_mb=6144"
            echo "\`\`\`"
            echo
            echo "## Replay command"
            echo
            echo "Each generated crash candidate was replayed with:"
            echo
            echo "\`\`\`bash"
            echo "/out/$TARGET /testcase \\"
            echo "  -runs=1 \\"
            echo "  -timeout=60 \\"
            echo "  -rss_limit_mb=6144 \\"
            echo "  -print_final_stats=1"
            echo "\`\`\`"
            echo
            echo "## Replay results"
            echo
            echo "| File | Size | SHA-1 | SHA-256 | Exit code | Reproduced | Raw stdout/stderr |"
            echo "|---|---:|---|---|---:|---:|---|"

            if [ -f "$RESULT_TSV" ]; then
              tail -n +2 "$RESULT_TSV" | while IFS=$'\t' read -r file size sha1 sha256 exit_code reproduced raw_path; do
                echo "| \`$file\` | $size | \`$sha1\` | \`$sha256\` | $exit_code | $reproduced | \`$raw_path\` |"
              done
            fi

            echo
            echo "## Triage guidance"
            echo
            echo "- First inspect \`fuzzing-stdout-stderr.log\`."
            echo "- If it contains \`StackOverflowError\`, \`OutOfMemoryError\`, \`AssertionError\`, \`ERROR: libFuzzer\`, \`SUMMARY\`, or \`Test unit written to\`, that section is the primary evidence."
            echo "- If replay also reproduces non-zero exit, the issue is a confirmed input-level reproducer."
            echo "- If fuzzing reports a crash but replay exits 0, treat it as a crash candidate, not a confirmed upstream bug."
            echo "- Do not publish crash inputs publicly until the security impact is understood."
          } > "$REPORT"

      - name: Upload crash triage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-java-crash-triage-artifacts
          path: |
            crash-triage
            crashes
          retention-days: 7
          compression-level: 9

      - name: Print final result
        if: always()
        run: |
          echo "fuzzing_exit_code=${{ steps.fuzz.outputs.exit_code }}"
          echo "crash_candidates=${{ steps.replay.outputs.total_candidates }}"
          echo "replay_reproduced=${{ steps.replay.outputs.replay_reproduced }}"
          echo "replay_not_reproduced=${{ steps.replay.outputs.replay_not_reproduced }}"
          echo "Download artifact: json-java-crash-triage-artifacts"
